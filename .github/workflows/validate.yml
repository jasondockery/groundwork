name: Validate

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install validation tools
        run: brew install chezmoi

      - name: Validate Groundwork
        run: scripts/validate-groundwork
