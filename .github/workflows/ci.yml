name: CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: workflow-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # zizmor uploads SARIF findings to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      # Static security analysis for the workflows themselves: unpinned
      # actions, expression injection, over-broad permissions. Mirrors the
      # roost repo's workflow-lint job (same action, same pin, same persona).
      # advanced-security uploads SARIF to the repo's code scanning tab —
      # free on public repos — so findings persist and annotate PRs instead
      # of living only in the job log.
      - name: Zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          persona: pedantic
          advanced-security: true

  # Runs on Linux deliberately: the darwin cases in validate-groundwork are
  # chezmoi template *data* (rendered profiles), not host requirements — the
  # full script passes on Ubuntu in ~2s. The previous macos-latest + brew
  # install setup spent 30-40s per run at 10x the billing rate for no coverage.
  render-lint:
    name: render-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          # Full history: the discovery-artifacts check regenerates sitemap
          # lastmod dates from each page's last git commit. A shallow clone
          # reports HEAD's date for every file, so the regenerated sitemap
          # never matches the committed one and the check fails only in CI.
          # blob:none keeps it cheap: commit and tree history is all the
          # per-file dates need, so old file contents are never fetched.
          # Do not drop either line — a shallow clone silently breaks the check.
          fetch-depth: 0
          filter: blob:none

      # chezmoi floats latest here, matching the old brew behavior; the repo's
      # .chezmoiversion pin is asserted by the validation script itself.
      - name: Install validation tools
        run: |
          sudo apt-get update -qq
          # tmux and zsh are test dependencies, not extras. Note the ubuntu
          # runner's tmux is older than the 3.6 that tmux-copy-last requires
          # (-C/-P copy flags), so the tmux behavior suite deliberately skips
          # here and is REQUIRED on the macOS job below, where Homebrew supplies
          # a current tmux. Asking apt for "tmux" does not establish the feature
          # contract; running the suite against 3.6+ does.
          sudo apt-get install -y -qq --no-install-recommends ripgrep zsh tmux shellcheck jq
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin

      # The validation script emits gcc-format shellcheck output under
      # GITHUB_ACTIONS; this matcher turns those lines into file/line
      # annotations on the PR. Registration is a workflow command (an echo),
      # not an action, and staying registered for the rest of the job is fine.
      - name: Register shellcheck problem matcher
        run: echo "::add-matcher::.github/problem-matchers/shellcheck-gcc.json"

      - name: Validate Groundwork
        run: scripts/validate-groundwork

  # tmux-copy-last manipulates the user's clipboard and paste buffers, and its
  # safety depends on tmux 3.6+ (-C/-P). The ubuntu runner ships an older tmux,
  # so that suite would skip there forever and the gate would still be green.
  # This job supplies a current tmux via Homebrew and REQUIRES the suite to run:
  # GROUNDWORK_REQUIRE_TMUX=1 turns a skip into a failure.
  tmux-behavior:
    name: tmux-behavior (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0
          filter: blob:none

      - name: Install validation tools
        run: |
          brew install tmux chezmoi ripgrep shellcheck jq
          tmux_version="$(tmux -V | awk '{print $2}')"
          tmux_major="${tmux_version%%.*}"
          tmux_minor="${tmux_version#*.}"
          tmux_minor="${tmux_minor%%[!0-9]*}"
          if [ "$tmux_major" -lt 3 ] || { [ "$tmux_major" -eq 3 ] && [ "$tmux_minor" -lt 6 ]; }; then
            echo "::error::tmux $tmux_version is below the 3.6 that tmux-copy-last requires (-C/-P copy flags)."
            exit 1
          fi
          echo "tmux $tmux_version (>= 3.6 required)"

      - name: Validate Groundwork (tmux suite required)
        env:
          GROUNDWORK_REQUIRE_TMUX: "1"
        run: scripts/validate-groundwork

      # The cask checksum policy is only real if it is a gate. This needs
      # Homebrew and network metadata, so it cannot live in the offline
      # validator — but "run it by hand sometimes" is not a policy either.
      - name: Audit Homebrew cask integrity
        run: scripts/audit-brew-casks

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Full history so gitleaks scans every commit, not just the tip.
          # Deliberately NOT diff-scoped: the flattened history keeps this
          # whole job at 6-10s. Revisit (diff on PR, full scan nightly) only
          # if history growth ever makes it slow.
          fetch-depth: 0
          persist-credentials: false

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      # Layer cache persists across runs via the GitHub Actions cache backend;
      # this is the job that was ~140s uncached. Trade-off: cached layers pin
      # the "latest release" tools until Dockerfile/install-script edits bust
      # them — fine for a smoke test, and any tooling change rebuilds fully.
      - name: Build amd64 image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: groundwork:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            github_token=${{ github.token }}

      # pipefail so a smoke-test failure is not masked by tee; the summary
      # append is fail-open (|| true) so reporting can never fail the job.
      - name: Smoke test image
        run: |
          set -o pipefail
          docker run --rm groundwork:test zsh -ic 'rg --version && nvim --version && tmux -V && mise --version && uv --version && zoxide --version && atuin --version && starship --version && lazygit --version && delta --version && eza --version && sesh --version && echo OK' | tee "$RUNNER_TEMP/smoke-versions.txt"
          {
            echo "## docker-build smoke test"
            echo
            echo '```'
            cat "$RUNNER_TEMP/smoke-versions.txt"
            echo '```'
          } >>"$GITHUB_STEP_SUMMARY" || true
