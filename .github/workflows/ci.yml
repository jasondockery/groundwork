name: CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render-lint:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install validation tools
        run: brew install chezmoi ripgrep shellcheck

      - name: Validate Groundwork
        run: scripts/validate-groundwork

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build amd64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: groundwork:test

      - name: Smoke test image
        run: docker run --rm groundwork:test zsh -ic 'rg --version && nvim --version && tmux -V && echo OK'
