name: Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy
    permissions:
      contents: read
      pages: write # publish the built site to GitHub Pages
      id-token: write # OIDC token for deploy-pages' deployment attestation
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          # Tags are the version source of truth for the footer stamp below.
          fetch-depth: 0
          fetch-tags: true

      # Stamp the released version (latest semver tag) into every page
      # footer, linking to release notes. The tracked HTML deliberately says
      # "dev" — truthful for anyone viewing docs from a local checkout — and
      # only the published build carries a version claim. Versions are never
      # hand-edited in HTML.
      - name: Stamp docs version from latest tag
        run: |
          VERSION="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [ -n "$VERSION" ]; then
            find docs -name '*.html' -exec sed -i "s|class=\"gw-version\"\([^>]*\)>dev<|class=\"gw-version\"\1>${VERSION}<|g" {} +
            echo "Stamped ${VERSION}"
          else
            echo "No tag found; leaving 'dev'"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
        with:
          enablement: true

      - name: Upload static docs
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
          path: docs

      # Pages' backend intermittently rejects deployments with a generic "try again
      # later" (four times in the first week of July 2026 alone); one retry after a
      # short pause has cleared it every time. Both steps failing still fails the job.
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
        with:
          artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Pause before retrying deployment
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - name: Retry deploy to GitHub Pages
        id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
        with:
          artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
