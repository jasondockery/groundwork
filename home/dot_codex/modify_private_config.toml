#!/usr/bin/env bash
set -euo pipefail

# Codex owns and updates config.toml, so merge this one durable setting instead
# of replacing the file and erasing plugin, marketplace, or project state.
awk '
  BEGIN {
    in_policy = 0
    found_policy = 0
    found_profile = 0
  }

  /^\[shell_environment_policy\][[:space:]]*$/ {
    found_policy = 1
    in_policy = 1
    print
    next
  }

  /^\[/ {
    if (in_policy && !found_profile) {
      print "experimental_use_profile = true"
      found_profile = 1
    }
    in_policy = 0
  }

  in_policy && /^[[:space:]]*experimental_use_profile[[:space:]]*=/ {
    print "experimental_use_profile = true"
    found_profile = 1
    next
  }

  { print }

  END {
    if (in_policy && !found_profile) {
      print "experimental_use_profile = true"
    }
    if (!found_policy) {
      if (NR > 0) print ""
      print "[shell_environment_policy]"
      print "experimental_use_profile = true"
    }
  }
'
