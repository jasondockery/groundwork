"$schema" = 'https://starship.rs/config-schema.json'

# The prompt shows the OS badge and the repo-relative path on every line so
# copied terminal text carries its context: when a human pastes a snippet into
# an AI tool, the agent can see which repo and folder the commands ran in.
# Versions stay out of the prompt — mise owns those (`mise current`).
format = """
[](red)\
$os\
[](bg:peach fg:red)\
$directory\
[](fg:peach)\
$cmd_duration\
$line_break\
$character"""

# The right prompt is empty in normal use: hostname appears only over SSH,
# jobs only while something runs in the background. TRANSIENT_RPROMPT in
# .zshrc erases it from accepted lines, so scrollback stays clean.
right_format = """
$jobs\
$hostname"""

# Switch to catppuccin_latte for a light terminal.
palette = 'catppuccin_mocha'

[os]
disabled = false
style = "bg:red fg:crust"
format = '[ $symbol ]($style)'

# Cover every environment Groundwork targets: Mac desktops, Linux and WSL
# (which reports the distro, e.g. Ubuntu), Windows itself, and the slim
# distros common in Docker images. Linux is the catch-all for anything else.
[os.symbols]
Macos = "󰀵"
Linux = "󰌽"
Ubuntu = "󰕈"
Arch = "󰣇"
Debian = "󰣚"
Fedora = "󰣛"
Windows = "󰍲"
Alpine = ""
CentOS = ""
RedHatEnterprise = "󱄛"
Amazon = ""
NixOS = ""

[username]
show_always = false
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user]($style)'

# truncate_to_repo (starship's default) pins the repo name to the front of
# the path at any depth (…/roost, …/roost/tools/github), so copied terminal
# text always names the project without spending width on ~/code/.
[directory]
style = "bg:peach fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
truncate_to_repo = true

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

# Not in the top-level format: the path capsule already identifies the repo,
# and branch/status live one `git status` away. Kept configured so adding
# $git_branch$git_status back to `format` is a one-line change; the caps are
# inside the modules so the capsule would only render inside a repository.
[git_branch]
symbol = ""
style = "bg:lavender"
format = '[](fg:lavender)[[ $symbol $branch ](fg:crust bg:lavender)]($style)'

[git_status]
style = "bg:lavender"
format = '[[($all_status$ahead_behind )](fg:crust bg:lavender)]($style)[](fg:lavender)'

[nodejs]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[bun]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[c]
symbol = " "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[rust]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[golang]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[php]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[java]
symbol = " "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[kotlin]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[haskell]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[python]
symbol = ""
style = "bg:green"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:crust bg:green)]($style)'

[jobs]
symbol = "✦"
style = "fg:peach"
format = '[$symbol$number ]($style)'

[hostname]
ssh_only = true
style = "fg:sapphire"
format = '[$ssh_symbol$hostname ]($style)'

[conda]
symbol = "  "
style = "fg:crust bg:sapphire"
format = '[$symbol$environment ]($style)'
ignore_base = false

[time]
disabled = true
time_format = "%R"
style = "bg:lavender"
format = '[[  $time ](fg:crust bg:lavender)]($style)'

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[❯](bold fg:green)'
error_symbol = '[❯](bold fg:red)'
vimcmd_symbol = '[❮](bold fg:green)'
vimcmd_replace_one_symbol = '[❮](bold fg:lavender)'
vimcmd_replace_symbol = '[❮](bold fg:lavender)'
vimcmd_visual_symbol = '[❮](bold fg:yellow)'

[cmd_duration]
show_milliseconds = true
format = ' [ $duration](fg:overlay1)'
disabled = false

